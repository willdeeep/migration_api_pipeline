# CI gate. Runs on every PR to main and on pushes to non-main branches.
# This is the required status check that protects main (#10).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint (incl. import order)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest -m "not integration"
