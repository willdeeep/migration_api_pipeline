# Fast local quality gate — mirrors CI so red code rarely reaches a PR.
# Install once:  uv run pre-commit install
# Run manually:  uv run pre-commit run --all-files
default_install_hook_types: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (check)
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: ruff lint (incl. import order)
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest (unit)
        entry: uv run pytest -m "not integration" -q
        language: system
        types: [python]
        pass_filenames: false
